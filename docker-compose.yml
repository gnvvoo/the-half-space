# docker-compose.yml
services:
  postgres:
    image: postgres:16
    container_name: ths-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ths-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data: